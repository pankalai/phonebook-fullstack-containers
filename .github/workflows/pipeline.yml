name: Deployment pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  
    build_and_test:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'

        # Frontend
        - name: Install dependencies frontend
          working-directory: frontend
          run: npm ci

        - name: Lint frontend
          working-directory: frontend
          run: npm run lint

        # Backend
        - name: Install dependencies backend
          run: npm ci

        - name: Lint backend
          run: npm run lint

        # Tests
        - name: Run tests
          run: npm run test

    deploy:
      needs: [build_and_test]
      if: ${{ needs.build_and_test.result == 'success' && github.event_name == 'push' && !contains(github.event.head_commit.message || '', '#skip') }}
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        
        - uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Install frontend dependencies
          working-directory: frontend
          run: npm ci

        - name: Build frontend
          working-directory: frontend
          run: npm run build

        - name: Setup flyctl
          uses: superfly/flyctl-actions/setup-flyctl@master
        - name: Deploy app
          run: flyctl deploy --remote-only --wait-timeout 300
          env:
            FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    tag_release:
      needs: [deploy]
      if: ${{ needs.deploy.result == 'success' && github.event_name == 'push' && !contains(github.event.head_commit.message || '', '#skip') }}
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Bump version and push tag
          uses: anothrNick/github-tag-action@1.75.0
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            DEFAULT_BUMP: patch

        