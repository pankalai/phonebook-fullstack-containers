name: Deployment pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  
    build_and_test:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: '20'

        # Frontend
        - name: Install dependencies frontend
          working-directory: frontend
          run: npm ci

        - name: Lint frontend
          working-directory: frontend
          run: npm run lint

        - name: Build frontend
          working-directory: frontend
          run: npm run build

        # Backend
        - name: Install dependencies backend
          run: npm ci

        - name: Lint backend
          run: npm run lint

        # Tests
        - name: Run tests
          run: npm run test

        